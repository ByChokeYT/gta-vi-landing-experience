[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Security headers for all routes
[[headers]]
  for = "/*"
    [headers.values]
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      X-Content-Type-Options = "nosniff"
      Referrer-Policy = "strict-origin-when-cross-origin"
      Content-Security-Policy = "upgrade-insecure-requests"

# Long-term cache optimization for static assets generated by Vite/Astro
[[headers]]
  for = "/_astro/*"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts for maximum rendering performance
[[headers]]
  for = "/fonts/*"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

# Cache radio music mp3 tracks
[[headers]]
  for = "/audio/*"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"
